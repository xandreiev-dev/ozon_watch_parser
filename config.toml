[parser]
# Сколько страниц Ozon обходить на каждую брендовую ссылку.
pages = 20

# Минимум уникальных карточек на бренд. Для крупных брендов есть брендовые лимиты в коде.
min_cards = 200

# Лёгкая фильтрация по итоговой цене товара.
min_price = 1000
max_price = 300000

# По умолчанию парсер делает 2 обхода на бренд: исходная ссылка + sorting=price.
# Третий обход sorting=rating сильно увеличивает время и включается только для контрольного полного прогона.
include_rating_sort = false

# Куда писать промежуточные брендовые файлы и итоговый XLSX.
export_dir = "brand_exports"

[cdp]
# Основной режим работы Ozon-парсера: Chrome через CDP.
url = "http://localhost:9222"
auto_launch_chrome = true
headless = false

